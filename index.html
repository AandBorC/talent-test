<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天赋密码测评 — 找到你的天生赛道</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F8F7FF;--card:#FFF;--text:#2D3436;--muted:#636E72;--border:#DFE6E9;
    --radius:16px;--radius-sm:10px;
    --shadow:0 2px 20px rgba(108,92,231,.08);
    --shadow-hover:0 8px 30px rgba(108,92,231,.18);
  }
  body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .page{visibility:hidden;position:absolute;top:0;left:0;width:100%;opacity:0;pointer-events:none;animation:none}
  .page.active{visibility:visible;position:relative;opacity:1;pointer-events:auto;animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* HERO */
  #page-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(145deg,#F8F7FF 0%,#EDE9FF 50%,#E8F8F5 100%)}
  .hero-badge{background:rgba(108,92,231,.1);color:#6C5CE7;font-size:12px;font-weight:600;letter-spacing:1.5px;padding:6px 16px;border-radius:20px;margin-bottom:1.5rem}
  .hero-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;text-align:center;line-height:1.2;margin-bottom:1rem;background:linear-gradient(135deg,#4834D4,#6C5CE7,#8E44AD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{font-size:1.1rem;color:var(--muted);text-align:center;max-width:580px;line-height:1.8;margin-bottom:2.5rem}
  .hero-stats{display:flex;gap:2rem;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center}
  .stat-item{text-align:center}
  .stat-num{font-size:1.8rem;font-weight:800;color:#6C5CE7}
  .stat-label{font-size:12px;color:var(--muted);margin-top:2px}
  .btn-primary{background:linear-gradient(135deg,#6C5CE7,#4834D4);color:white;border:none;padding:16px 48px;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(108,92,231,.35);letter-spacing:.5px}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,92,231,.45)}
  .type-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem;max-width:560px}
  .type-tag{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:white;color:var(--muted);font-weight:500}

  /* QUIZ */
  #page-quiz{min-height:100vh;padding:0}
  .quiz-header{background:white;border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .quiz-logo{font-weight:800;font-size:1.1rem;color:#6C5CE7}
  .quiz-progress-wrap{flex:1;margin:0 2rem}
  .progress-bar-bg{height:6px;background:#F0EDFF;border-radius:3px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#A29BFE,#6C5CE7);border-radius:3px;transition:width .4s ease}
  .progress-label{font-size:12px;color:var(--muted);margin-bottom:6px}
  .quiz-body{max-width:720px;margin:0 auto;padding:3rem 1.5rem}
  .question-card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:2.5rem;box-shadow:var(--shadow);margin-bottom:2rem}
  .question-num{font-size:12px;font-weight:600;color:#6C5CE7;text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem}
  .question-text{font-size:1.15rem;font-weight:700;line-height:1.6;margin-bottom:2rem;color:var(--text)}
  .options-grid{display:flex;flex-direction:column;gap:12px}
  .option-btn{background:#F8F7FF;border:2px solid transparent;border-radius:var(--radius-sm);padding:1rem 1.25rem;cursor:pointer;text-align:left;font-size:.92rem;line-height:1.5;color:var(--text);transition:all .2s;display:flex;align-items:flex-start;gap:12px}
  .option-btn:hover{border-color:#A29BFE;background:#EDE9FF}
  .option-btn.selected{border-color:#6C5CE7;background:#EDE9FF}
  .option-btn .opt-letter{width:30px;height:30px;min-width:30px;border-radius:50%;background:white;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s}
  .option-btn.selected .opt-letter{background:#6C5CE7;border-color:#6C5CE7;color:white}
  .quiz-nav{display:flex;justify-content:space-between;align-items:center}
  .btn-secondary{background:white;color:#6C5CE7;border:2px solid #6C5CE7;padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-secondary:hover{background:#EDE9FF}
  .btn-secondary:disabled{opacity:.3;cursor:not-allowed}
  .btn-next{background:#6C5CE7;color:white;border:none;padding:12px 32px;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;opacity:.4}
  .btn-next.enabled{opacity:1}
  .btn-next.enabled:hover{background:#4834D4;transform:translateX(2px)}

  /* ANALYZING */
  #page-analyzing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
  .ai-ring{width:100px;height:100px;margin:0 auto 2rem;position:relative}
  .ai-ring svg{animation:rotate 2s linear infinite}
  @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .ai-ring .center-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem}
  .analyzing-title{font-size:1.5rem;font-weight:800;color:#6C5CE7;margin-bottom:1rem;text-align:center}
  .analyzing-steps{text-align:left;margin-top:1.5rem;max-width:320px;margin-left:auto;margin-right:auto}
  .step-item{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:.9rem;color:var(--muted);border-bottom:1px solid var(--border)}
  .step-item.done{color:#00B894}
  .step-item.done .step-dot{background:#00B894}
  .step-item.active-step{color:#6C5CE7;font-weight:600}
  .step-item.active-step .step-dot{background:#6C5CE7;animation:pulse 1s infinite}
  .step-dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(--border)}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}

  /* RESULT */
  #page-result{min-height:100vh;padding:0 0 4rem}
  .result-hero{padding:3rem 2rem 2rem;text-align:center}
  .result-type-badge{display:inline-block;padding:8px 20px;border-radius:50px;font-size:.85rem;font-weight:700;margin-bottom:1rem}
  .result-title{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:.5rem}
  .result-tagline{font-size:1.1rem;color:var(--muted);margin-bottom:2rem}
  .result-body{max-width:860px;margin:0 auto;padding:0 1.5rem}

  /* Radar */
  .radar-container{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow);text-align:center}
  .radar-container h3{font-size:.9rem;font-weight:700;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:1px}

  /* Dimension bars */
  .dimension-bars{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .dim-title{font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:1.2rem}
  .dim-row{margin-bottom:.9rem}
  .dim-label{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:4px}
  .dim-label span:first-child{font-weight:600}
  .dim-label span:last-child{font-weight:700}
  .dim-bar-bg{height:8px;background:#F0EDFF;border-radius:4px;overflow:hidden}
  .dim-bar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

  /* Sections */
  .sections-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem}
  @media(max-width:640px){.sections-grid{grid-template-columns:1fr}}
  .section-card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;box-shadow:var(--shadow)}
  .section-card h3{font-size:.95rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .section-card h3 .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
  .section-card ul{list-style:none}
  .section-card ul li{font-size:.88rem;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:6px}
  .section-card ul li:last-child{border-bottom:none}
  .section-card ul li::before{content:"·";color:#6C5CE7;font-weight:800;font-size:1.2rem;line-height:1.2}

  /* AI Analysis */
  .ai-analysis{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .ai-header{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem}
  .ai-chip{background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;letter-spacing:.5px}
  .ai-content{font-size:.93rem;line-height:1.9;color:var(--muted)}
  .ai-content strong{color:var(--text);font-weight:700}
  .risk-box{background:#FFF8F0;border-left:4px solid #FDCB6E;border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:1rem 1.25rem;margin-top:1rem;font-size:.88rem;color:#636E72;line-height:1.7}

  /* Career Map */
  .career-map{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .career-map h3{font-size:.95rem;font-weight:700;margin-bottom:1rem}
  .career-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .career-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:600}

  /* Type Comparison */
  .type-compare{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .type-compare h3{font-size:.95rem;font-weight:700;margin-bottom:1rem}
  .compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .compare-card{border-radius:var(--radius-sm);padding:1.2rem;cursor:pointer;border:2px solid transparent;transition:all .2s}
  .compare-card:hover{transform:translateY(-2px)}
  .compare-card .c-emoji{font-size:2rem;margin-bottom:8px}
  .compare-card .c-name{font-size:.9rem;font-weight:700;margin-bottom:4px}
  .compare-card .c-jobs{font-size:.78rem;opacity:.8;line-height:1.5}

  /* MVP */
  .mvp-plan{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem 2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .mvp-plan h3{font-size:1rem;font-weight:700;margin-bottom:1.2rem}
  .mvp-steps{display:flex;flex-direction:column}
  .mvp-step{display:flex;gap:16px}
  .mvp-step-left{display:flex;flex-direction:column;align-items:center}
  .mvp-step-num{width:32px;height:32px;min-width:32px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
  .mvp-step-line{width:2px;flex:1;margin:4px 0;min-height:20px}
  .mvp-step:last-child .mvp-step-line{display:none}
  .mvp-step-content{padding:4px 0 20px}
  .mvp-step-content h4{font-size:.92rem;font-weight:700;margin-bottom:4px}
  .mvp-step-content p{font-size:.87rem;color:var(--muted);line-height:1.6}

  .result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:2rem}
  .btn-share{background:white;color:#6C5CE7;border:2px solid #6C5CE7;padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-share:hover{background:#EDE9FF}
  .btn-restart{background:linear-gradient(135deg,#6C5CE7,#4834D4);color:white;border:none;padding:12px 32px;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-restart:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,92,231,.35)}
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:12px 24px;border-radius:50px;font-size:.9rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- HERO -->
<div id="page-hero" class="page active">
  <div class="hero-badge">天赋密码测评 · 2026专业版</div>
  <h1 class="hero-title">你的天赋<br>就是你的竞争壁垒</h1>
  <p class="hero-sub">30道情境选择题，AI行为心理学模型分析<br>精准定位你的「天生赛道」——覆盖360行职业方向</p>
  <div class="hero-stats">
    <div class="stat-item"><div class="stat-num">10</div><div class="stat-label">天赋维度</div></div>
    <div class="stat-item"><div class="stat-num">30</div><div class="stat-label">情景测试题</div></div>
    <div class="stat-item"><div class="stat-num">10</div><div class="stat-label">天赋类型</div></div>
    <div class="stat-item"><div class="stat-num">150+</div><div class="stat-label">职业方向</div></div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:2rem">
    <button class="btn-primary" onclick="startQuiz()">⚡ 快速测评（30题）</button>
    <button class="btn-primary" onclick="location.href='excavator.html'" style="background:linear-gradient(135deg,#A29BFE,#4834D4)">🔍 深度挖掘（对话式）</button>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:1.5rem">快速测评适合初步了解 · 深度挖掘适合职业规划关键决策</div>
  <div class="type-tags">
    <span class="type-tag">表达传播者</span><span class="type-tag">系统架构者</span><span class="type-tag">人际连接者</span><span class="type-tag">创造构建者</span><span class="type-tag">分析研究者</span><span class="type-tag">审美设计者</span><span class="type-tag">战略决策者</span><span class="type-tag">教育培训者</span><span class="type-tag">开拓冒险者</span><span class="type-tag">执行运营者</span>
  </div>
</div>

<!-- QUIZ -->
<div id="page-quiz" class="page">
  <div class="quiz-header">
    <div class="quiz-logo">天赋密码</div>
    <div class="quiz-progress-wrap">
      <div class="progress-label" id="progress-text">第 1 / 30 题</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:3.33%"></div></div>
    </div>
    <div style="font-size:13px;color:var(--muted);min-width:60px;text-align:right" id="progress-pct">3%</div>
  </div>
  <div class="quiz-body">
    <div class="question-card">
      <span class="question-num" id="q-num">问题 01</span>
      <div class="question-text" id="q-text"></div>
      <div class="options-grid" id="q-options"></div>
    </div>
    <div class="quiz-nav">
      <button class="btn-secondary" id="btn-prev" onclick="prevQuestion()" disabled>← 上一题</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>
</div>

<!-- ANALYZING -->
<div id="page-analyzing" class="page">
  <div style="text-align:center;max-width:400px;padding:2rem">
    <div class="ai-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#F0EDFF" stroke-width="6"/>
        <circle cx="50" cy="50" r="44" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="180 100"/>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#A29BFE"/></linearGradient></defs>
      </svg>
      <div class="center-icon">🧠</div>
    </div>
    <div class="analyzing-title">AI 正在分析你的天赋密码...</div>
    <div class="analyzing-steps" id="analyze-steps"></div>
  </div>
</div>

<!-- RESULT -->
<div id="page-result" class="page">
  <div class="result-hero" id="result-hero"></div>
  <div class="result-body" id="result-body"></div>
  <div style="text-align:center;margin-top:1rem">
    <div class="result-actions">
      <button class="btn-share" onclick="copyResult()">复制结果分享</button>
      <button class="btn-restart" onclick="restartQuiz()">重新测评</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 10 天赋类型定义 ==========
const TYPE_COLORS = {
  EXPR:'#6C5CE7', ARCH:'#00B894', CONN:'#E17055', BUIL:'#FDCB6E', ANLY:'#0984E3',
  DESN:'#E84393', STRT:'#2D3436', EDUC:'#6AB04C', VENT:'#E4A820', EXEC:'#636E72'
};
const TYPE_LIGHTS = {
  EXPR:'#EDE9FF', ARCH:'#E8F8F5', CONN:'#FFF0ED', BUIL:'#FFF9EC', ANLY:'#E8F2FC',
  DESN:'#FDE8F3', STRT:'#F0F0F0', EDUC:'#EEF7EA', VENT:'#FFF8E8', EXEC:'#F0F0F0'
};

const TYPES = {
  EXPR:{code:'EXPR',name:'表达传播者',emoji:'🎙️',
    tagline:'你的嘴就是最好的武器，你的脑子就是最好的CPU',
    desc:'你天生具备把复杂信息拆解、整合、再以有趣方式传递出去的能力。在人群中，你是那个能把一件事讲得有声有色的人；在信息面前，你是那个能快速找到核心并加入洞察的人。这是你大脑的出厂配置，不是后天学来的技巧。',
    strengths:['故事化表达，把复杂概念变简单','信息整合与快速归纳总结','天然的内容创作嗅觉和节奏感','能在传播中注入独特观点和人格'],
    careers:['自媒体运营/博主','短视频创作者/主播','品牌文案策划','播客主理人/配音','公关/媒体发言人','内容营销策划','知识付费创作者','出版编辑/记者','广告创意/文案','社区/社群内容运营','剧本编剧','品牌故事官'],
    weak:'注意力容易分散；有时表达太多，忘记倾听；产出创意容易，但持续深耕一个方向需要刻意训练。',
    mvp:[{t:'建立垂直内容账号',d:'选一个你真正感兴趣的细分领域，发10条内容。不追爆款，只看自己做完是否有成就感和表达欲。'},
         {t:'测试市场反馈',d:'观察哪类内容完播率高、评论有实质互动——那就是天赋和市场需求的交叉点。'},
         {t:'产品化你的表达',d:'把反复被问到的问题做成付费专栏、课程或社群，从免费输出升级到价值变现。'},
         {t:'构建内容护城河',d:'同一主题深耕6-12个月，你的认知密度会让后来者难以追上。'}],
    ai:'你的行为模式显示：当你接收到信息时，大脑会自动完成「整合-重组-输出」三步。这意味着你的信息处理路径天然倾向于对外传播。<br><br>从心流机制来看，你在「讲清楚一件事」的过程中会进入高度专注状态。别人靠自律死磕「今天必须更新」，而你靠本能驱动——<strong>你的坚持成本比竞争对手低得多</strong>，这才是天赋变现的经济学基础。'
  },
  ARCH:{code:'ARCH',name:'系统架构者',emoji:'📐',
    tagline:'混乱是你的敌人，系统是你的超能力',

// ========== 随机抽题 ==========
// 分层抽样：每维度随机抽perDim题，然后打乱顺序，保证覆盖均匀
function selectQuestions(bank, perDim) {
  const groups = {};
  bank.forEach(q => {
    if (!groups[q.primaryDim]) groups[q.primaryDim] = [];
    groups[q.primaryDim].push(q);
  });
  const selected = [];
  Object.values(groups).forEach(g => {
    // Fisher-Yates shuffle
    const pool = [...g];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    selected.push(...pool.slice(0, perDim));
  });
  // 整体打乱
  for (let i = selected.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [selected[i], selected[j]] = [selected[j], selected[i]];
  }
  return selected;
}

function initQuestions() {
  return selectQuestions(questionBank, 3);
}

let questions = initQuestions();

let answers = new Array(questions.length).fill(null);

// ========== QUIZ LOGIC ==========
function startQuiz() {
  showPage('page-quiz');
  renderQuestion(0);
}

function renderQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];
  document.getElementById('q-num').textContent = `问题 ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[idx] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.txt}</span>`;
    btn.onclick = () => selectOption(idx,i);
    optContainer.appendChild(btn);
  });
  const total = questions.length;
  const pct = Math.round((idx+1)/total*100);
  document.getElementById('progress-text').textContent = `第 ${idx+1} / ${total} 题`;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('btn-prev').disabled = idx===0;
  updateNextBtn();
  document.getElementById('btn-next').textContent = idx===total-1 ? '查看结果 →' : '下一题 →';
}

function selectOption(qIdx,optIdx) {
  answers[qIdx] = optIdx;
  document.querySelectorAll('.option-btn').forEach((b,i) => b.classList.toggle('selected',i===optIdx));
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  answers[currentQ] !== null ? btn.classList.add('enabled') : btn.classList.remove('enabled');
}

function nextQuestion() {
  if(answers[currentQ]===null) return;
  if(currentQ===questions.length-1) { analyzeResults(); return; }
  renderQuestion(currentQ+1);
}

function prevQuestion() {
  if(currentQ>0) renderQuestion(currentQ-1);
}

// ========== ANALYSIS ==========
function calcScores() {
  const raw = {};
  Object.keys(DIMS).forEach(k=>raw[k]=0);
  const maxEach = {};
  Object.keys(DIMS).forEach(k=>maxEach[k]=0);
  questions.forEach((q,i)=>{
    if(answers[i]!==null){
      const opt = q.opts[answers[i]];
      Object.entries(opt.dims).forEach(([k,v])=>{
        raw[k] = (raw[k]||0) + v;
      });
    }
  });
  // Find max across all questions' dims
  questions.forEach(q=>{
    q.opts.forEach(opt=>{
      Object.entries(opt.dims).forEach(([k,v])=>{
        maxEach[k] = Math.max(maxEach[k]||0, v);
      });
    });
  });
  // Calculate max possible (if user always picked highest-scoring option per dim)
  const maxPossible = {};
  Object.keys(DIMS).forEach(k=>{
    let total = 0;
    questions.forEach(q=>{
      let best = 0;
      q.opts.forEach(opt=>{ best = Math.max(best, (opt.dims[k]||0)); });
      total += best;
    });
    maxPossible[k] = total;
  });
  // Normalize to 0-100
  const scores = {};
  Object.keys(DIMS).forEach(k=>{
    scores[k] = maxPossible[k]>0 ? Math.round(raw[k]/maxPossible[k]*100) : 0;
  });
  return scores;
}

function getTopTypes(scores, count) {
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return sorted.slice(0,count).map(([k])=>DIMS[k].type);
}

function analyzeResults() {
  showPage('page-analyzing');
  const steps = ['收集行为偏好数据','运行10维度权重算法','匹配天赋类型模型','生成职业封装建议','输出个性化成长路径'];
  const container = document.getElementById('analyze-steps');
  container.innerHTML = steps.map((s,i)=>`<div class="step-item" id="as${i}"><span class="step-dot"></span>${s}</div>`).join('');
  let si = 0;
  function advance() {
    if(si>0) document.getElementById('as'+(si-1)).className = 'step-item done';
    if(si<steps.length) {
      document.getElementById('as'+si).className = 'step-item active-step';
      si++;
      setTimeout(advance, 600);
    } else {
      setTimeout(()=>{ buildResult(); showPage('page-result'); }, 400);
    }
  }
  setTimeout(advance, 250);
}

      <h3 style="font-size:1.05rem;font-weight:700">${primary.emoji} ${primary.name} × ${secondary.emoji} ${secondary.name}</h3>
    </div>
    <div class="ai-content">
      你的天赋并不是单一的——<strong>${primary.name}</strong>和<strong>${secondary.name}</strong>的叠加，形成了你独特的竞争力配方。<br><br>
      这意味着：你可以在<strong>${primary.name}的主战场上，用${secondary.name}的方式打出差异化</strong>。
      大多数人只在一个维度上发力，而你拥有两个维度的协同效应——这是复合型人才最核心的护城河。
    </div>
  </div>`;

  // MVP for primary
  let mvpHTML = `<div class="mvp-plan">
    <h3>📋 ${primary.name}的6个月天赋变现路线图</h3>
    <div class="mvp-steps">
      ${primary.mvp.map((s,i)=>`<div class="mvp-step">
        <div class="mvp-step-left">
          <div class="mvp-step-num" style="background:${primary.color||TYPE_COLORS[topTypes[0]]}">${i+1}</div>
          <div class="mvp-step-line" style="background:${primary.light||TYPE_LIGHTS[topTypes[0]]}"></div>
        </div>
        <div class="mvp-step-content"><h4>${s.t}</h4><p>${s.d}</p></div>
      </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('result-body').innerHTML =
    radarHTML + barsHTML + cardsHTML + compareHTML + careerMapHTML + aiHTML + synergyHTML + mvpHTML;

  // Animate bars
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar-fill').forEach(b=>{ b.style.width = b.dataset.target+'%'; });
  },100);

  // Draw radar
  setTimeout(()=>drawRadar(scores), 200);
}

// ========== RADAR CHART ==========
function drawRadar(scores) {
  const c = document.getElementById('radarCanvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const cx = w/2, cy = h/2 - 10;
  ctx.clearRect(0,0,w,h);
  const dimKeys = Object.keys(DIMS);
  const n = dimKeys.length;
  const r = 190;
  const levels = 5;

  // Grid
  const gridColors = ['#F0F0F0','#E8E8E8','#E0E0E0','#D8D8D8','#D0D0D0'];
  for(let l=1;l<=levels;l++){
    ctx.beginPath();
    ctx.strokeStyle = gridColors[l-1];
    ctx.lineWidth = 0.5;
    for(let i=0;i<n;i++){
      const angle = Math.PI*2/n*i - Math.PI/2;
      const x = cx + r*l/levels*Math.cos(angle), y = cy + r*l/levels*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Axes
  for(let i=0;i<n;i++){
    const angle = Math.PI*2/n*i - Math.PI/2;
    ctx.beginPath();
    ctx.strokeStyle = '#E0E0E0';
    ctx.lineWidth = 0.5;
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
    ctx.stroke();
  }

  // Data
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const angle = Math.PI*2/n*i - Math.PI/2;
    const dk = dimKeys[i];
    const val = scores[dk]/100;
    const x = cx + r*val*Math.cos(angle), y = cy + r*val*Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(108,92,231,0.12)';
  ctx.fill();
  ctx.strokeStyle = '#6C5CE7';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Dots
  for(let i=0;i<n;i++){
    const angle = Math.PI*2/n*i - Math.PI/2;
    const dk = dimKeys[i], val = scores[dk]/100;
    const x = cx + r*val*Math.cos(angle), y = cy + r*val*Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle = '#6C5CE7';
    ctx.fill();
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Labels
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '600 12px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
  for(let i=0;i<n;i++){
    const angle = Math.PI*2/n*i - Math.PI/2;
    const dk = dimKeys[i];
    const labelR = r + 42;
    let x = cx + labelR*Math.cos(angle), y = cy + labelR*Math.sin(angle);
    // Color per label
    ctx.fillStyle = DIMS[dk].color;
    ctx.fillText(DIMS[dk].name, x, y);
  }
}

// ========== UTILS ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function copyResult() {
  const scores = calcScores();
  const topTypes = getTopTypes(scores,1);
  const T = TYPES[topTypes[0]];
  const sortedTop = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const text = `【天赋密码测评结果】\n\n主导类型：${T.name}（${T.code}型）\n${T.tagline}\n\n前三维度：\n${sortedTop.map(([k,v],i)=>(i+1)+'. '+DIMS[k].name+': '+v+'分').join('\n')}\n\n匹配方向：${T.careers.slice(0,5).join(' / ')}\n\n测测你的天赋 👉 #天赋密码`;
  navigator.clipboard.writeText(text).then(()=>showToast('结果已复制，去分享吧 🎉')).catch(()=>showToast('请手动复制'));
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function restartQuiz() { questions=initQuestions(); answers=new Array(questions.length).fill(null); currentQ=0; startQuiz(); }
