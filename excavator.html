<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深度天赋挖掘机 — 找到你的底层天赋</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F8F7FF;--card:#FFF;--text:#2D3436;--muted:#636E72;--border:#DFE6E9;
    --primary:#6C5CE7;--primary-light:#EDE9FF;--accent:#A29BFE;
    --radius:16px;--radius-sm:10px;
    --shadow:0 2px 20px rgba(108,92,231,.08);
  }
  body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* Page system - same as index.html */
  .page{visibility:hidden;position:absolute;top:0;left:0;width:100%;opacity:0;pointer-events:none;animation:none}
  .page.active{visibility:visible;position:relative;opacity:1;pointer-events:auto;animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* ===== Opening Page ===== */
  #page-opening{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:linear-gradient(160deg,#F8F7FF 0%,#EDE9FF 40%,#F0EDFF 100%)}
  .opening-icon{font-size:4rem;margin-bottom:1.5rem;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .opening-title{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.3;margin-bottom:1.2rem;background:linear-gradient(135deg,#4834D4,#6C5CE7,#8E44AD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .opening-sub{font-size:1rem;color:var(--muted);max-width:600px;line-height:1.9;margin-bottom:2rem}
  .opening-features{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:2.5rem;max-width:540px}
  .opening-feat{padding:8px 16px;border-radius:20px;background:white;font-size:13px;color:var(--primary);font-weight:600;border:1px solid var(--primary-light)}
  .opening-time{font-size:13px;color:var(--muted);margin-bottom:2rem;display:flex;align-items:center;gap:6px;justify-content:center}
  .btn-start{background:linear-gradient(135deg,#6C5CE7,#4834D4);color:white;border:none;padding:16px 48px;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(108,92,231,.35);letter-spacing:.5px}
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,92,231,.5)}

  /* ===== Chat Page ===== */
  #page-chat{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
  .chat-header{background:white;border-bottom:1px solid var(--border);padding:14px 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  .chat-header .back-btn{background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .chat-header .chat-title{font-weight:700;font-size:.95rem;color:var(--primary)}
  .chat-header .progress-wrap{flex:1;margin:0 1rem}
  .chat-progress-bg{height:4px;background:#F0EDFF;border-radius:2px;overflow:hidden}
  .chat-progress-fill{height:100%;background:linear-gradient(90deg,#A29BFE,#6C5CE7);border-radius:2px;transition:width .4s ease}
  .chat-header .step-label{font-size:11px;color:var(--muted)}
  .chat-body{flex:1;max-width:720px;width:100%;margin:0 auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
  .msg{display:flex;gap:10px;max-width:88%}
  .msg-ai{align-self:flex-start}
  .msg-user{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{width:36px;height:36px;min-width:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
  .msg-ai .msg-avatar{background:var(--primary-light);color:var(--primary)}
  .msg-user .msg-avatar{background:#E8F8F5;color:#00B894}
  .msg-bubble{padding:14px 18px;border-radius:18px;font-size:.92rem;line-height:1.7;position:relative}
  .msg-ai .msg-bubble{background:white;border:1px solid var(--border);color:var(--text);border-top-left-radius:4px}
  .msg-user .msg-bubble{background:var(--primary);color:white;border-top-right-radius:4px}
  .msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:center;width:100%}
  .typing-indicator{display:flex;gap:4px;padding:14px 18px;background:white;border:1px solid var(--border);border-radius:18px;border-top-left-radius:4px;align-self:flex-start;width:60px}
  .typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--primary-light);animation:typing 1.2s infinite}
  .typing-indicator span:nth-child(2){animation-delay:.2s}
  .typing-indicator span:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

  .chat-input-area{padding:1rem 1.5rem;background:white;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
  .chat-input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:.92rem;font-family:inherit;resize:none;min-height:44px;max-height:120px;outline:none;transition:border-color .2s;line-height:1.5}
  .chat-input:focus{border-color:var(--primary)}
  .chat-send-btn{background:var(--primary);color:white;border:none;border-radius:50%;width:44px;height:44px;min-width:44px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .chat-send-btn:hover{background:#4834D4;transform:scale(1.05)}
  .chat-send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

  /* Quick reply chips */
  .quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .quick-reply{padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:2px solid var(--primary-light);background:var(--primary-light);color:var(--primary);transition:all .2s}
  .quick-reply:hover{border-color:var(--primary);background:var(--primary);color:white}

  /* ===== Analyzing Page ===== */
  #page-analyzing2{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
  .analyzing-ring{width:100px;height:100px;margin:0 auto 2rem;position:relative}
  .analyzing-ring svg{animation:rotate 2s linear infinite}
  @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .analyzing-title{font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:1rem;text-align:center}
  .analyzing-subtitle{font-size:.9rem;color:var(--muted);margin-bottom:1.5rem;text-align:center}
  .analyzing-steps{text-align:left;max-width:360px;margin:0 auto}
  .astep{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:.88rem;color:var(--muted);border-bottom:1px solid var(--border)}
  .astep.done{color:#00B894}
  .astep.done .asdot{background:#00B894}
  .astep.active{color:var(--primary);font-weight:600}
  .astep.active .asdot{background:var(--primary);animation:pulse 1s infinite}
  .asdot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(--border)}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}

  /* ===== Report Page ===== */
  #page-report{min-height:100vh;padding:0 0 3rem}
  .report-hero{padding:3rem 2rem 2rem;text-align:center;background:linear-gradient(160deg,#F8F7FF,#EDE9FF)}
  .report-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:1rem}
  .report-title{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;margin-bottom:.8rem;line-height:1.3}
  .report-subtitle{font-size:1rem;color:var(--muted);max-width:560px;margin:0 auto;line-height:1.7}
  .report-body{max-width:800px;margin:0 auto;padding:0 1.5rem}
  .report-section{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
  .report-section h2{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;display:flex;align-items:center;gap:10px}
  .report-section h2 .sec-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
  .report-section p,.report-section li{font-size:.92rem;line-height:1.85;color:var(--muted)}
  .report-section ul{padding-left:1.2rem;margin-top:.8rem}
  .report-section li{margin-bottom:.5rem}
  .highlight-box{background:var(--primary-light);border-left:4px solid var(--primary);padding:1.2rem 1.5rem;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:1.2rem 0;line-height:1.8;font-size:.92rem;color:var(--text)}
  .dims-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:1rem}
  .dim-card{padding:1rem;border-radius:var(--radius-sm);border:2px solid transparent;transition:all .2s}
  .dim-card .dim-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
  .dim-card .dim-desc{font-size:.82rem;opacity:.8;line-height:1.5}
  .career-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem}
  .career-tag{padding:5px 12px;border-radius:14px;font-size:.82rem;font-weight:600}
  .report-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:2rem;padding-bottom:2rem}
  .btn-copy{background:white;color:var(--primary);border:2px solid var(--primary);padding:12px 28px;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-copy:hover{background:var(--primary-light)}
  .btn-back{background:linear-gradient(135deg,#6C5CE7,#4834D4);color:white;border:none;padding:12px 32px;border-radius:50px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-back:hover{transform:translateY(-1px)}

  /* Toast */
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:12px 24px;border-radius:50px;font-size:.9rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:640px){
    .opening-title{font-size:1.6rem}
    .report-body{padding:0 1rem}
    .report-section{padding:1.2rem}
    .dims-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<!-- Page 1: Opening -->
<div id="page-opening" class="page active">
  <div class="opening-icon">🔍</div>
  <h1 class="opening-title">深度天赋挖掘机</h1>
  <p class="opening-sub">
    这不是一张测评表，而是一次关于「你是谁」的深度对话。<br>
    通过苏格拉底式引导，帮你找到被埋藏的底层天赋，<br>
    并生成一份专属于你的《天赋使用说明书》。
  </p>
  <div class="opening-features">
    <span class="opening-feat">🧠 深度对话引导</span>
    <span class="opening-feat">📖 万字天赋说明书</span>
    <span class="opening-feat">💡 嫉妒信号分析</span>
    <span class="opening-feat">🎯 职业封装建议</span>
    <span class="opening-feat">🔄 反宿命论视角</span>
  </div>
  <div class="opening-time">
    ⏱ 预计占用 15-25 分钟 · 最多 10 个问题 · 全程无评判
  </div>
  <button class="btn-start" onclick="startExcavation()">开始挖掘 →</button>
  <div style="margin-top:2rem;font-size:13px;color:var(--muted)">
    💡 天赋永远不会过期，我们只是要找到你的底层天赋。
  </div>
</div>

<!-- Page 2: Chat -->
<div id="page-chat" class="page">
  <div class="chat-header">
    <button class="back-btn" onclick="confirmExit()">←</button>
    <div class="chat-title">🔍 天赋挖掘机</div>
    <div class="progress-wrap">
      <div class="chat-progress-bg"><div class="chat-progress-fill" id="chat-progress" style="width:5%"></div></div>
    </div>
    <div class="step-label" id="chat-step-label">准备开始</div>
  </div>
  <div class="chat-body" id="chat-body">
    <!-- Messages will be inserted here -->
  </div>
  <div class="chat-input-area" id="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="写下你的想法..." rows="1" onkeydown="handleInputKey(event)"></textarea>
    <button class="chat-send-btn" id="chat-send-btn" onclick="sendUserMessage()">↑</button>
  </div>
</div>

<!-- Page 3: Analyzing -->
<div id="page-analyzing2" class="page">
  <div style="text-align:center;max-width:420px;padding:2rem">
    <div class="analyzing-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#F0EDFF" stroke-width="6"/>
        <circle cx="50" cy="50" r="44" fill="none" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round" stroke-dasharray="180 100"/>
        <defs><linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#A29BFE"/></linearGradient></defs>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem">🧠</div>
    </div>
    <div class="analyzing-title">正在深度分析你的天赋密码...</div>
    <div class="analyzing-subtitle" id="analyze-subtitle2">整合对话信息中</div>
    <div class="analyzing-steps" id="analyze-steps2"></div>
  </div>
</div>

<!-- Page 4: Report -->
<div id="page-report" class="page">
  <div class="report-hero" id="report-hero">
    <div class="report-badge" id="report-badge" style="background:#EDE9FF;color:#6C5CE7">📖 天赋使用说明书</div>
    <h1 class="report-title" id="report-title">你的天赋说明书</h1>
    <p class="report-subtitle" id="report-subtitle">基于深度对话生成 · 天赋不会过期，你只是需要被看见</p>
  </div>
  <div class="report-body" id="report-body">
    <!-- Report content will be inserted here -->
  </div>
  <div class="report-actions">
    <button class="btn-copy" onclick="copyReport()">📋 复制完整报告</button>
    <button class="btn-back" onclick="restartExcavation()">🔄 重新对话</button>
  </div>
</div>

<div class="toast" id="toast2"></div>

<script>
// ========== Dialogue Engine ==========
// 4 core questions + dynamic follow-ups
const CORE_QUESTIONS = [
  {
    id: 'q1',
    core: true,
    question: '咱们先从一个有点怀旧的问题开始。\n\n请你回忆一下，16岁之前——就是还没被高考、找工作这些「应该做的事」完全框住之前——有哪些事情是没人逼你、甚至大人可能还觉得是在「浪费时间」，但你却会废寝忘食去做的？\n\n或者换个角度：从小到大，你有哪些被批评的「顽固缺点」？比如爱插嘴、太敏感、老发呆、话太多……',
    followUps: [
      { trigger: '发呆|走神|白日梦|想象|幻想', question: '你提到会发呆和白日梦，能具体说说那时候你脑子里都在「演」什么吗？有没有一些反复出现的画面或故事？' },
      { trigger: '插嘴|说话|表达|讲|说', question: '你提到爱说话、爱插嘴，那时候你最想「说」的是什么样的内容？是讲笑话让大家笑，还是讲你发现的一个「秘密」？' },
      { trigger: '敏感|情绪|哭|委屈', question: '你对情绪的感知很早就显现出来了。那时候，有没有一个具体时刻，你感知到了别人没感知到的东西？' },
      { trigger: '拆|搭|做|动手|积木|乐高', question: '你提到小时候喜欢拆东西或者动手做东西，那时候你「做出来」的东西，有没有让大人惊讶过？' },
    ],
    analyze: (answer) => {
      // Extract hints from answer
      const hints = [];
      if (/画|写|故事|小说|编/.test(answer)) hints.push({type:'EXPR',ev:2,reason:'童年有表达/创作倾向'});
      if (/拆|搭|积木|乐高|做|动手/.test(answer)) hints.push({type:'BUIL',ev:2,reason:'童年有构建/动手倾向'});
      if (/人|朋友|社交|聊天|说话/.test(answer)) hints.push({type:'CONN',ev:1,reason:'童年社交活跃'});
      if (/书|读|研究|问为什么|好奇/.test(answer)) hints.push({type:'ANLY',ev:2,reason:'童年有探究倾向'});
      if (/整齐|分类|顺序|规则/.test(answer)) hints.push({type:'ARCH',ev:1,reason:'童年有秩序感'});
      if (/美|好看|颜色|搭配/.test(answer)) hints.push({type:'DESN',ev:1,reason:'童年有审美敏感'});
      if (/冒险|探索|外面|新/.test(answer)) hints.push({type:'VENT',ev:1,reason:'童年有探索倾向'});
      return hints;
    }
  },
  {
    id: 'q2',
    core: true,
    question: '好，我们来到第二个问题。\n\n成年之后——不管是工作还是日常生活——有没有哪件事，你做的时候心里想过：「这还需要学吗？这不是显而易见的吗？」\n\n但奇怪的是，周围人却觉得这件事挺难的，甚至还有人专门去上课、考证来学。\n\n那种「我天生就会」但别人觉得很厉害的事——你想到什么了？',
    followUps: [
      { trigger: '写|表达|文案|文章|说|讲', question: '你提到「写」或者「表达」对你来说显而易见，能举个例子吗？比如一篇报告、一次发言，或者一次让别人记住你的表达？' },
      { trigger: '整理|流程|计划|安排|管', question: '「把事情理顺」对你来说是本能，但具体是哪类事情？是整理信息、安排项目，还是协调人？' },
      { trigger: '懂|理解|分析|数据|逻辑', question: '你提到理解某些东西对你来说很自然，那这种「懂」通常体现在什么场景？是理解人、理解数据，还是理解系统？' },
      { trigger: '做|修|解决|工具', question: '「动手解决」是你无意识胜任的区域，那你现在工作中，有没有因为这个能力被低估过？' },
    ],
    analyze: (answer) => {
      const hints = [];
      if (/写|文案|文章|表达|讲|说|沟通/.test(answer)) hints.push({type:'EXPR',ev:3,reason:'无意识胜任表达类任务'});
      if (/整理|流程|计划|项目|协调|安排/.test(answer)) hints.push({type:'ARCH',ev:2,reason:'无意识胜任系统类任务'});
      if (/懂|分析|数据|逻辑|理解|研究/.test(answer)) hints.push({type:'ANLY',ev:2,reason:'无意识胜任分析类任务'});
      if (/修|做|解决|工具|代码|设计/.test(answer)) hints.push({type:'BUIL',ev:2,reason:'无意识胜任构建类任务'});
      if (/人|沟通|协调|感知|情绪/.test(answer)) hints.push({type:'CONN',ev:1,reason:'无意识胜任人际类任务'});
      return hints;
    }
  },
  {
    id: 'q3',
    core: true,
    question: '第三个问题，可能会让你有点意外。\n\n回忆一下：有没有哪件事，做完之后身体很累——比如加班到很晚，或者忙了一整天——但你的精神状态却是极度兴奋的？\n\n就像「身体在抗议，但大脑在开派对」的那种感觉。\n\n具体是什么事给了你这种「回血」的感觉？',
    followUps: [
      { trigger: '讲|分享|培训|教|课', question: '你提到做完之后很兴奋，而且跟「教别人」或者「分享」有关。那种兴奋里，有没有一种「被看见」的感觉？还是单纯享受这个过程本身？' },
      { trigger: '解决|搞定|完成|做出来', question: '「把事情搞定」让你兴奋，这种兴奋是来自「终于做完了」的解脱，还是来自「我居然能做到这样」的惊喜？' },
      { trigger: '人|团队|大家|一起', question: '你提到和人一起做事让你兴奋，那在这种兴奋里，你更多是「带领者」的感觉，还是「连接者」的感觉？' },
      { trigger: '新|第一次|尝试|探索', question: '「尝试新东西」让你兴奋，那这种兴奋里有没有一种「赌对了」的感觉？就是冒险之后的快感。' },
    ],
    analyze: (answer) => {
      const hints = [];

// ========== State ==========
let currentQIndex = 0;
let answers = [];  // {question, answer, hints[]}
let followUpQueue = [];
let askedCount = 0;
const MAX_QUESTIONS = 10;

// ========== Page Control ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display='none'; });
  const target = document.getElementById(id);
  target.classList.add('active');
  target.style.display = 'flex';
  window.scrollTo(0,0);
}

function startExcavation() {
  currentQIndex = 0;
  answers = [];
  followUpQueue = [];
  askedCount = 0;
  showPage('page-chat');
  document.getElementById('chat-body').innerHTML = '';
  addAIMessage(CORE_QUESTIONS[0].question, true);
  updateChatProgress();
}

function addAIMessage(text, hasQuickReplies) {
  const body = document.getElementById('chat-body');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-ai';
  
  // Format text with line breaks
  const formattedText = text.replace(/\n/g, '<br>');
  
  let html = `<div class="msg-avatar">🧠</div>
    <div>
      <div class="msg-bubble">${formattedText}</div>`;
  
  if (hasQuickReplies) {
    html += `<div class="quick-replies">
        <span class="quick-reply" onclick="sendQuickReply('好，我想想...')">好，我想想...</span>
        <span class="quick-reply" onclick="sendQuickReply('这个问题挺有意思的')">这个问题挺有意思的</span>
      </div>`;
  }
  
  html += `</div>`;
  msgDiv.innerHTML = html;
  body.appendChild(msgDiv);
  body.scrollTop = body.scrollHeight;
}

function addTypingIndicator() {
  const body = document.getElementById('chat-body');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg msg-ai';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `<div class="msg-avatar">🧠</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>`;
  body.appendChild(typingDiv);
  body.scrollTop = body.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addUserMessage(text) {
  const body = document.getElementById('chat-body');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-user';
  msgDiv.innerHTML = `<div class="msg-avatar">😊</div>
    <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  body.appendChild(msgDiv);
  body.scrollTop = body.scrollHeight;
}

function sendQuickReply(text) {
  addUserMessage(text);
  document.getElementById('chat-input').value = '';
  handleAnswer(text);
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendUserMessage();
  }
}

function sendUserMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  handleAnswer(text);
}

function handleAnswer(answerText) {
  // Save answer
  const currentQ = getCurrentQuestion();
  answers.push({
    question: currentQ ? currentQ.question : 'Follow-up',
    answer: answerText,
    hints: currentQ ? currentQ.analyze(answerText) : []
  });
  askedCount++;
  
  // Show typing
  addTypingIndicator();
  updateChatProgress();
  
  // AI "thinks" then responds
  setTimeout(() => {
    removeTypingIndicator();
    processAnswer(answerText);
  }, 1200 + Math.random() * 800);
}

function getCurrentQuestion() {
  if (currentQIndex < CORE_QUESTIONS.length) {
    return CORE_QUESTIONS[currentQIndex];
  }
  return null;
}

function processAnswer(answerText) {
  // Check if we should ask a follow-up
  const currentQ = CORE_QUESTIONS[currentQIndex];
  let followUp = null;
  
  if (currentQ && currentQ.followUps) {
    for (const fu of currentQ.followUps) {
      if (new RegExp(fu.trigger).test(answerText)) {
        followUp = fu;
        break;
      }
    }
  }
  
  if (followUp && askedCount < MAX_QUESTIONS) {
    // Ask follow-up
    addAIMessage(followUp.question, true);
  } else {
    // Move to next core question or finish
    currentQIndex++;
    if (currentQIndex < CORE_QUESTIONS.length && askedCount < MAX_QUESTIONS) {
      // Ask next core question with warm transition
      const transitions = [
        '谢谢你分享这些，我能感受到这些东西对你的意义。\n\n我们来到第二个问题。',
        '你的回答让我对你有了更多了解。\n\n现在，我想邀请你思考第三个问题。',
        '好，我们已经聊了三个很重要的问题。\n\n最后一个问题，可能会有点冒犯——但对我来说非常关键。'
      ];
      const transIdx = Math.min(currentQIndex - 1, 2);
      setTimeout(() => {
        addAIMessage(transitions[transIdx] + '\n\n' + CORE_QUESTIONS[currentQIndex].question, true);
      }, 600);
    } else {
      // Finish - ask if user wants to add more
      if (askedCount < MAX_QUESTIONS) {
        addAIMessage('我们已经聊了' + askedCount + '个问题，我已经收集到了很多有价值的信息。\n\n你还有什么想补充的吗？或者我们可以直接进入分析阶段，为你生成《天赋使用说明书》。', true);
        // Override quick replies
        setTimeout(() => {
          const lastMsg = document.querySelector('#chat-body .msg-ai:last-child .quick-replies');
          if (lastMsg) {
            lastMsg.innerHTML = `
              <span class="quick-reply" onclick="addMoreContext()">还有想补充的...</span>
              <span class="quick-reply" onclick="finishAndAnalyze()">直接生成报告 ✓</span>
            `;
          }
        }, 100);
      } else {
        finishAndAnalyze();
      }
    }
  }
}

function addMoreContext() {
  addAIMessage('好，请继续。还有什么关于你的天赋线索，是我们在前面的对话中没有触及到的？\n\n比如：你最害怕的事、你最骄傲的时刻、别人经常误以为你的特点……', true);
}

function finishAndAnalyze() {
  addAIMessage('好，我已经收集到了足够的信息。\n\n现在让我安静地整合一下我们的对话，为你生成一份真正有价值的《天赋使用说明书》。\n\n这可能需要一点时间——因为你的天赋值得被认真对待。✨', false);
  
  setTimeout(() => {
    showPage('page-analyzing2');
    runAnalysisAnimation();
  }, 1500);
}

function updateChatProgress() {
  const pct = Math.min(100, Math.round(askedCount / MAX_QUESTIONS * 100));
  document.getElementById('chat-progress').style.width = pct + '%';
  document.getElementById('chat-step-label').textContent = `第 ${askedCount} / ${MAX_QUESTIONS} 题`;
}

function confirmExit() {
  if (askedCount > 0) {
    if (confirm('确定要退出吗？当前对话内容将不会保存。')) {
      showPage('page-opening');
    }
  } else {
    showPage('page-opening');
  }
}

// ========== Analysis Animation ==========
function runAnalysisAnimation() {
  const steps = [
    '深度解析对话语义...',
    '识别天赋信号模式...',
    '交叉验证四个核心维度...',
    '分析嫉妒信号与阴影天赋...',
    '生成个性化天赋说明书...'
  ];
  const container = document.getElementById('analyze-steps2');
  container.innerHTML = steps.map((s,i) => 
    `<div class="astep" id="as2_${i}"><span class="asdot"></span>${s}</div>`
  ).join('');
  
  document.getElementById('analyze-subtitle2').textContent = '整合对话信息中';
  
  let si = 0;
  function advance() {
    if (si > 0) document.getElementById('as2_'+(si-1)).className = 'astep done';
    if (si < steps.length) {
      document.getElementById('as2_'+si).className = 'astep active';
      document.getElementById('analyze-subtitle2').textContent = steps[si];
      si++;
      setTimeout(advance, 900);
    } else {
      setTimeout(() => {
        generateReport();
        showPage('page-report');
      }, 600);
    }
  }
  setTimeout(advance, 300);
}

// ========== Utils ==========
function copyReport() {
  const title = document.getElementById('report-title').textContent;
  const subtitle = document.getElementById('report-subtitle').textContent;
  const body = document.getElementById('report-body').innerText;
  const text = `【深度天赋挖掘机 · 天赋使用说明书】\n\n${title}\n${subtitle}\n\n${'─'.repeat(30)}\n\n${body}\n\n${'─'.repeat(30)}\n🔍 天赋永远不会过期，我们只是要找到你的底层天赋。`;
  
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast2');
    t.textContent = '报告已复制，去分享吧 📋';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }).catch(() => {
    const t = document.getElementById('toast2');
    t.textContent = '请手动复制';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  });
}
